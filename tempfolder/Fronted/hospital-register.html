<!DOCTYPE html>
<html>
<head>
    <title>Hospital Registration</title>
</head>
<body>

<h2>Hospital Registration</h2>

<input type="text" id="name" placeholder="Hospital Name"><br><br>

<input type="email" id="email" placeholder="Email"><br><br>

<input type="password" id="password" placeholder="Password"><br><br>

<input type="text" id="location" placeholder="Location"><br><br>

<button onclick="registerHospital()">
Register Hospital
</button>

<script>

async function registerHospital(){

    const data = {
        hospital_name:
        document.getElementById("name").value,

        email:
        document.getElementById("email").value,

        password:
        document.getElementById("password").value,

        location:
        document.getElementById("location").value
    };

    const res = await fetch(
    "http://localhost:5000/api/users/hospital-register",
    {
        method:"POST",
        headers:{
            "Content-Type":"application/json"
        },
        body:JSON.stringify(data)
    });

    alert(await res.text());
}

</script>

</body>
</html>
