<!DOCTYPE html>

<html>

<head>
    <title>Hospital Dashboard</title>

```
<link
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
    rel="stylesheet">
```

</head>

<body class="container mt-5">

```
<script>

const token = localStorage.getItem("token");

if (!token) {

    alert("Please Login First");
    window.location.href = "login.html";

}

</script>

<h1 class="mb-4">🏥 Hospital Dashboard</h1>

<button
    class="btn btn-primary"
    onclick="loadRequests()">
    Load Blood Requests
</button>

<hr>

<div id="requests"></div>

<script>

async function approveRequest(id) {

    try {

        const res = await fetch(
            `http://localhost:5000/api/users/approve-request/${id}`,
            {
                method: "PUT"
            }
        );

        const result = await res.text();

        alert(result);

        loadRequests();

    } catch (error) {

        console.error(error);
        alert("Error: " + error.message);

    }

}

async function loadRequests() {

    try {

        const res = await fetch(
            "http://localhost:5000/api/users/all-requests"
        );

        const data = await res.json();

        let output = "";

        data.forEach(r => {

            output += `
            <div class="card mb-3 shadow">
                <div class="card-body">

                    <h4>${r.patient_name}</h4>

                    <p><strong>Blood Group:</strong> ${r.blood_group}</p>

                    <p><strong>Units Needed:</strong> ${r.units_needed}</p>

                    <p><strong>Hospital:</strong> ${r.hospital}</p>

                    <p><strong>Location:</strong> ${r.location}</p>

                    <p><strong>Contact:</strong> ${r.contact}</p>

                    <p><strong>Status:</strong> ${r.status}</p>

                    <button
                        class="btn btn-success"
                        onclick="approveRequest(${r.id})">
                        Approve
                    </button>

                </div>
            </div>
            `;
        });

        document.getElementById("requests").innerHTML = output;

    } catch (error) {

        console.error(error);
        alert("Error: " + error.message);

    }

}

</script>
```

</body>

</html>
