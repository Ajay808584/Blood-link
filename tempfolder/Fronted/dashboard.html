<script>

async function emergencyAlert(){

    const bloodGroup = prompt(
        "Enter Blood Group Needed (O+, A+, B+, AB+)"
    );

    if(!bloodGroup){
        return;
    }

    try {

        const res = await fetch(
            "http://localhost:5000/api/users/emergency-alert",
            {
                method: "POST",
                headers: {
                    "Content-Type": "application/json"
                },
                body: JSON.stringify({
                    blood_group: bloodGroup
                })
            }
        );

        const result = await res.text();

        alert(result);

    } catch(error){

        console.error(error);
        alert("Error: " + error.message);

    }
}

function logout(){

    localStorage.removeItem("token");

    alert("Logged Out");

    window.location.href = "login.html";
}

</script>
